    {"sanitizedProfile":"Position: Testmanager\n\nSprachen: Deutsch (C2), Englisch (konversationssicher)\n\nWerdegang:\n- Testmanager / QA Lead | 2022-01-01\n  Verantwortlich für Konzept, Steuerung und Kontrolle aller Testaktivitäten in Kundenprojekten. Ich erstelle Teststrategien und Testkonzepte, wähle passende Testmethoden und Werkzeuge aus und führe die Testteams in agilen und DevOps-getriebenen Projekten. Ich koordiniere Kommunikation zwischen Fachbereichen, Kunden und der Entwicklung auf Fach-, Technik- und Managementebene, leite Testfortschritts- und Qualitätsreports ab, manage Risiken sowie Prozessoptimierungen nach TPI NEXT und übernehme projektbezogene Reisetätigkeit innerhalb Deutschlands. Ich arbeite regelmäßig in internationalen Projektteams und führe Berichte, Abstimmungen und Workshops sicher auf Deutsch und Englisch durch.\n  Skills: Testmanagement (EXZELLENT) [Testmanagement], Teststrategie (EXZELLENT) [Testmanagement], Testkonzeption (EXZELLENT) [Testmanagement], TPI NEXT (EXZELLENT) [Testmanagement], Coaching (SEHR_GUT) [Soft Skills], Jira (EXZELLENT) [Defektmanagement], Micro Focus ALM (SEHR_GUT) [Defektmanagement], Testautomation (SEHR_GUT) [Testautomation], Reporting (SEHR_GUT) [Testmanagement], Stakeholder Management (SEHR_GUT) [Soft Skills], Agile Methoden (SEHR_GUT) [Vorgehensmodelle]\n- Senior Testmanager | 2018-09-01\n  Aufbau und Skalierung von Testprozessen für ein internationales Kundenteam in der Energiebranche. Ich habe Testziele definiert, Testphasen geplant und das projektübergreifende Testteam geführt. Zudem habe ich die Einführung von Cloud-gestützten QA-Tools und automatisierten Testpipelines begleitet.\n  Skills: Cloud Testing (SEHR_GUT) [Cloud], DevOps (SEHR_GUT) [Vorgehensmodelle], Konfigurationsmanagement (SEHR_GUT) [Projektmanagement], Projektmanagement (SEHR_GUT) [Projektmanagement], Teamführung (SEHR_GUT) [Soft Skills], Prozessoptimierung (SEHR_GUT) [Testmanagement], Datenbanktechnologien (SEHR_GUT) [Datenbanken], Kommunikation (SEHR_GUT) [Soft Skills]\n- Testmanager | 2015-04-01\n  Verantwortlich für die Einführung eines einheitlichen Testmanagements auf Basis von Jira und Micro Focus ALM. Ich habe Qualitätskennzahlen definiert, das Testdatenmanagement gesteuert und die Testführungskräfte gecoacht.\n  Skills: Jira (EXZELLENT) [Defektmanagement], Micro Focus ALM (EXZELLENT) [Defektmanagement], Testdatenmanagement (SEHR_GUT) [Testmanagement], Scrum (SEHR_GUT) [Vorgehensmodelle], Softwareentwicklungsprozesse (SEHR_GUT) [Projektmanagement]\n\nAusbildung:\n- Informatik | 2011-10-01 - 2015-09-30 | Bachelor of Science Informatik\n- Projektmanagement | 2016-05-01 - 2016-08-31 | Zertifikat Projektmanagement Professional\n\nProjekte:\n- Einführung eines ganzheitlichen QA-Ansatzes in SAP- und Cloud-Transformationsprojekten\n  Ich habe Teststrategien und Testkonzepte für SAP-Einführungsprojekte mit Fokus auf Qualitätssicherung, Testautomation und Testdatenmanagement entwickelt. Dabei habe ich das Projektteam in agilen Methoden geschult und ein unternehmensweites Reporting-Framework etabliert.\n  Skills: SAP Testmanagement (SEHR_GUT) [Testmanagement], Cloud (SEHR_GUT) [Cloud], Agile Methoden (SEHR_GUT) [Vorgehensmodelle], Reporting (SEHR_GUT) [Testmanagement], Testautomation (SEHR_GUT) [Testautomation]\n- KI-gestützte Testverfahren und datengetriebenes Quality Engineering\n  In einem Transformationsprojekt habe ich testbezogene Daten konsolidiert und mit KI-gestützten Analysewerkzeugen ausgewertet, um Teststrategien gezielt an Qualitätsrisiken auszurichten. Ich habe Test Pilot eingesetzt, um Testdatenmanagement und automatisierte Prüfprozesse zu verbessern, und die Ergebnisse in englischsprachigen Status-Reports und Workshops präsentiert.\n  Skills: KI-gestütztes Testing (SEHR_GUT) [Testautomation], Testdatenmanagement (EXZELLENT) [Testmanagement], Test Pilot (SEHR_GUT) [Testautomation], Data Driven Quality Engineering (SEHR_GUT) [Testmanagement], Englisch (Business) (SEHR_GUT) [Soft Skills]\n- Optimierung von QA-Prozessen nach TPI NEXT\n  Ich habe bestehende Testprozesse analysiert und Optimierungsempfehlungen entlang der TPI NEXT-Metriken umgesetzt. Das Ergebnis war eine deutlich bessere Prozessqualität, kürzere Testzyklen und transparenteres Stakeholder-Reporting.\n  Skills: TPI NEXT (EXZELLENT) [Testmanagement], Prozessanalyse (EXZELLENT) [Testmanagement], Stakeholder Reporting (EXZELLENT) [Testmanagement]\n\nZertifikate/Schulungen:\n- ISTQB Advanced Level Testmanager | true | 2020-03-15\n- Agile Coach / Scrum Master | true | 2021-11-01\n- Datenschutz für Mitarbeiter | true | 2019-05-01","job":"Als Teil der Capgemini-Gruppe schafft Sogeti durch Technologie Mehrwert für Organisationen, die Innovationen schnell umsetzen möchten und dazu lokal einen weltweit vertretenen Partner suchen. Mit einer lösungsorientierten Kultur und Kundennähe implementiert Sogeti Lösungen, die Unternehmen dabei helfen, schneller, besser und intelligenter zu arbeiten. Mit der Kombination von Agilität und Umsetzungsgeschwindigkeit durch einen DevOps-Ansatz liefert Sogeti innovative Lösungen in den Bereichen Quality Engineering, Cloud und Anwendungsentwicklung – jeweils unter Einsatz von KI, Daten und Automatisierung.\r\n\r\nDeine Rolle\r\nKonzeption, Management und Kontrolle aller Testaktivitäten in Kundenprojekten\r\nDefinition und Erstellung von Teststrategien und Testkonzepten sowie Auswahl geeigneter Methoden und Werkzeuge\r\nOrganisation des Projektteams, Kommunikation mit Kunden und Coaching des Testteams in allen fachlichen und methodischen Fragen\r\nErstellung von Reports für interne und externe Stakeholder sowie Überwachung von Qualitätszielen\r\nEntwicklung und Umsetzung von Maßnahmen zur Prozessoptimierung (z. B. nach TPI NEXT®)\r\nDein Profil\r\nErfahrung im Testmanagement sowie im Einsatz gängiger Testing-Tools (z. B. Micro Focus ALM, Jira) und Verständnis für Softwareentwicklungsprozesse\r\nKnow-how in Datenbanktechnologien, Konfigurationsmanagement und Projektmanagement\r\nKommunikationsstärke auf Fach-, Technik- und Managementebene sowie projektbezogene Reisebereitschaft innerhalb Deutschlands\r\nSehr gute Deutschkenntnisse (mindestens B2) und konversationssicheres Englisch\r\nWünschenswert: ISTQB® Advanced Level Testmanager, agiler Background, Erfahrung in Teamführung sowie abgeschlossenes Studium oder vergleichbare Ausbildung\r\nWas du bei uns schätzen wirst\r\nBei Sogeti kombinierst du dein Wissen mit deiner Leidenschaft für Technologie, treibst zukunftsweisende Themen voran und gestaltest die Welt von morgen aktiv mit.\r\n\r\nWir bieten dir ein Umfeld, in dem du dich stetig weiterentwickeln kannst. Unser Angebot an Weiterbildungsprogrammen hilft dir, eine Welt voller Möglichkeiten zu entdecken – sei es durch fachliche Schulungen, online Kurse, Mentoring, Coaching oder spezialisierte Programme für Führungskräfte.\r\n\r\nWir legen großen Wert auf die Vereinbarkeit von Arbeit und Privatleben. Arbeite nach Absprache hybrid aus dem Office, von zu Hause, an anderen Capgemini-Standorten in Deutschland oder aus dem Ausland. Flexible Arbeitszeitmodelle unterstützen dich dabei.\r\n\r\nDeine Benefits\r\nShareholder-Programm für Mitarbeitende / Firmen-Anteile\r\n\r\nMobiles Arbeiten möglich, auch aus dem Ausland\r\nFlexible Vertrauensarbeitszeit\r\nFirmenwagen und Jobrad optional\r\nZahlreiche interne Weiterbildungsmöglichkeiten\r\nVergünstigungen bei Sport- und Wellnesseinrichtungen (EGYM Wellpass)\r\nEdenred und zahlreiche Rabatte in diversen Onlineshops\r\nHome-Office-Ausstattung und vieles mehr...\r\n\r\nSämtliche in der Anzeige genannten Nebenleistungen geben lediglich einen ersten Überblick ohne Anerkennung einer Rechtspflicht. Sie richten sich nach den jeweils gültigen Betriebsvereinbarungen, Policies, betrieblichen Regelungen und Anspruchsvoraussetzungen zum Zeitpunkt des Eintritts in das Unternehmen.","language":"de"}
