t], Testautomatisierung (EXZELLENT) [Testing], Wissenstransfer (EXZELLENT) [Soft Skills], Kommunikation (SEHR_GUT) [Soft Skills], Best Practice (EXZELLENT) [Vorgehensmodelle]\n  Vereinheitlichung der Testbereiche und Konzeptionierung der automatisierten Testfälle in testOFFICE: Vor Beginn der Implementierung habe ich die zu testenden Bereiche standardisiert und zunächst schriftlich für das manuelle und automatisierte Testen festgehalten. So habe ich von Anfang an vermieden, Bereiche oder Module doppelt zu testen. Die Testfälle mit ihrer Hierarchie habe ich in testOFFICE angelegt und mit einer Beschreibung und einem erwarteten Ergebnis angereichert.\n  Skills: testOFFICE (EXZELLENT) [Testmanagement], Genauigkeit (EXZELLENT) [Soft Skills], Wissenstransfer (EXZELLENT) [Soft Skills], testOFFICE (EXZELLENT) [Testautomatisierung], Manuelles Testing (EXZELLENT) [Vorgehensmodelle]\n  Dokumentation und Präsentation der Prozesse sowie Reporting zum Fortschritt der Testaktivitäten: Während der gesamten Projektlaufzeit habe ich alle Prozesse in MS Office dokumentiert und dem Kunden in regelmäßigen Meetings z.B. in Form von PowerPoint-Präsentationen oder Excel-Charts vorgestellt. So konnte ich jederzeit über den Fortschritt der Testaktivitäten rund um die Testautomatisierung der dooh-it Website berichten.\n  Skills: Kommunikation (SEHR_GUT) [Soft Skills], Präsentationen (GUT) [Soft Skills], Teamfähigkeit (EXZELLENT) [Soft Skills], PowerPoint (SEHR_GUT) [MS Office], Excel (EXZELLENT) [MS Office], Word (EXZELLENT) [MS Office], Agile Vorgehensweise (EXZELLENT) [Vorgehensmodelle], SCRUM (EXZELLENT) [Vorgehensmodelle]\n  Testautomatisierung sowie Defektmanagement, Dokumentation und Einstufung der Tickets in Jira: Im Rahmen der automatisierten Testausführung stelle ich Abweichungen fest. Diese verifiziere ich, dokumentiere sie und trage sie in Jira ein. In Absprache mit dem Kunden lege ich die entsprechende Einstufung der Tickets, kritisch oder unkritisch, fest und trage diese in das Fehlermanagement ein. Auf dieser Basis kann der Kunde selbst über die Freigabe des Releases entscheiden.\n  Skills: Kommunikation (SEHR_GUT) [Soft Skills], Präsentationen (GUT) [Soft Skills], Jira (EXZELLENT) [Defektmanagement], Genauigkeit (EXZELLENT) [Soft Skills], Testautomatisierung (EXZELLENT) [Testing]\n- Qualifizierungsbeauftragter | 2021-06-25\n  Erstellung und Vorstellung von Schulungsunterlagen und der Protokolle sowie Aufnahme von Vorschlägen: Für die Schulung und das Coaching der Mitarbeiter der WSV erstelle ich in Zusammenarbeit mit erfahrenen Kollegen die Schulungsunterlagen und stelle diese dem Team in regelmäßigen Meetings vor. Für den Wissenstransfer protokolliere ich alles rund um die dezentrale Zeiterfassung der Behörde. Änderungsvorschläge werden direkt besprochen und gegebenenfalls im Nachhinein eingearbeitet.\n  Skills: Coaching (SEHR_GUT) [Vorgehensmodelle], Wissenstransfer (EXZELLENT) [Soft Skills], Präsentationen (GUT) [Soft Skills], PowerPoint (SEHR_GUT) [MS Office], Excel (EXZELLENT) [MS Office], Word (EXZELLENT) [MS Office], Schulungen (GUT) [Sonstige]\n  Vorbereitung der Schulungen und weiterer Trainer auf die Präsentationen zum DZF: Nachdem die Schulungsunterlagen erstellt sind, helfe ich den Kollegen, indem ich in \"Probe\"-Schulungen Verbesserungsvorschläge für die Präsentation gebe. Dadurch sind vor allem die weniger erfahrenen Mitarbeiter deutlich besser auf die kommenden Schulungen vorbereitet.\n  Skills: Coaching (SEHR_GUT) [Vorgehensmodelle], Schulungen (GUT) [Sonstige], Wissenstransfer (EXZELLENT) [Soft Skills], Präsentationen (GUT) [Soft Skills]\n  Koordinierung der Schulungen, Termine und Räume zur Qualifizierung der Mitarbeiter: In Absprache mit den Schulungszentren und den Coaches koordiniere ich die Schulungen und die Termine für die Mitarbeiter. Dazu zählt auch die Verwaltung der zu Verfügung stehenden Räumlichkeiten mit ausreichender Größe  und Bestuhlung pro Schulungstermin für die verschiedenen Ämter.\n  Skills: Coaching (SEHR_GUT) [Vorgehensmodelle], Kommunikation (SEHR_GUT) [Soft Skills], Teamfähigkeit (EXZELLENT) [Soft Skills], Microsoft Outlook (EXZELLENT) [MS Office]\n- Systemadministrator testOFFICE Systeme | 2019-12-24\n  Aktualisierung von testOFFICE nach einem Release und Information über den Abschluss: In regelmäßigen Abständen stellen wir eine neue Version von testOFFICE zur Verfügung. Die Aktualisierung der Systeme erfolgt in eigener Verantwortung. Der Kunde betreibt neben einem testOFFICE-Server zwei Client-Rechner. Der Zugriff auf die Systeme erfolgt über Citrix. Nach Absprache  aktualisiere ich testOFFICE und informiere das Team über den erfolgreichen Abschluss der Arbeiten.\n  Skills: testOFFICE (EXZELLENT) [Support], Citrix (SEHR_GUT) [Virtualisierung], Kommunikation (SEHR_GUT) [Soft Skills], testOFFICE (EXZELLENT) [Testautomatisierung], Systemtest (SEHR_GUT) [Teststufen / Testarten], Genauigkeit (EXZELLENT) [Soft Skills], testOFFICE - .NET Engine (EXZELLENT) [Testautomatisierung], testOFFICE - Browser Engine auf Basis von Selenium (EXZELLENT) [Testautomatisierung], testOFFICE - TCDL - Keyword driven testing (EXZELLENT) [Testautomatisierung], Java (EXZELLENT) [Programmiersprachen], Softwaretest (EXZELLENT) [Teststufen / Testarten], Keyword Driven Testing (SEHR_GUT) [Vorgehensmodelle]\n- Software-Entwickler | 2019-11-24\n  Einrichtung eines Jenkins-Servers und Erstellung eines Standard- und Pipelineprojektes: Um die Funktionalität der Implementierung zu testen, richte ich zunächst einen Jenkins-Server ein und erstelle zwei Projekte. Zum einen ein Standardprojekt und zum anderen ein Pipelineprojekt. Dabei mache ich mich mit der Bedienung von Jenkins vertraut und informiere mich über die einzelnen Schritte, die für die Implementierung wichtig sind, um diese gegebenenfalls mit dem PO zu besprechen.\n  Skills: Jenkins (SEHR_GUT) [Buildmanagement], Continuous Integration (SEHR_GUT) [Vorgehensmodelle], SCRUM (EXZELLENT) [Vorgehensmodelle], Agile Vorgehensweise (EXZELLENT) [Vorgehensmodelle]\n  Anforderungsanalyse, Konzeptionierung und Dokumentation in Jira sowie User Story Formulierung: Zuerst bespreche ich mit dem PO die Anforderungen an die neue Funktionalität von testOFFICE. Dabei behalte ich immer die Codebasis von testOFFICE im Auge und gebe Empfehlungen, wie das gewünschte Ergebnis effizient erreicht werden kann. Sind alle Anforderungen definiert, dokumentiere ich diese und erstelle erste User Stories in Jira.\n  Skills: Wissenstransfer (EXZELLENT) [Soft Skills], Jira (EXZELLENT) [Anforderungsmanagement], User Story Formulierung (EXZELLENT) [Anforderungsmanagement], Konzeptionierung (EXZELLENT) [Anforderungsmanagement], Kommunikation (SEHR_GUT) [Soft Skills]\n  Implementierung des neuen Moduls mit Java nach Best Practices in testOFFICE und Testklassen in JUnit: Bei der Implementierung mit Java achte ich immer darauf, nach Best Practices vorzugehen. Außerdem verwende ich so oft wie möglich bestehenden Code, da dieser bereits getestet und somit weniger fehleranfällig ist. Testklassen entwickle ich konsequent in JUnit, was mir bei der Entwicklung zusätzlich hilft. Der Code wird wie testOFFICE in Subversion verwaltet.\n  Skills: JUnit (EXZELLENT) [Testautomatisierung], Best Practice (EXZELLENT) [Vorgehensmodelle], Subversion (SVN) (SEHR_GUT) [Versionsverwaltung], Java (EXZELLENT) [Programmiersprachen], testOFFICE (EXZELLENT) [Testautomatisierung], testOFFICE (EXZELLENT) [Testmanagement]\n- Test Automation Engineer | 2018-02-20\n  Review, Erstellung und Bearbeitung automatisierter Testfälle mit der testOFFICE - SAP Engine: Meine Hauptaufgabe ist die Testfallreview sowie das Konzipieren und Erstellen automatisierter Testfälle mit der testOFFICE - SAP Engine. Darüber hinaus überarbeite ich auch alte Testfälle, um sie an den aktuellen Entwicklungsstand anzupassen. In Rücksprache mit den Abteilungen und durch eine direkte Kommunikation im Projekt kann ich mir Wissen über die Abläufe in SAP FI/CO und SAP LO-AB aneignen.\n  Skills: testOFFICE (EXZELLENT) [Testmanagement], SAP FI/CO (GUT) [SAP], SAP LO-AB (GUT) [SAP], testOFFICE - SAP Engine (EXZELLENT) [Testautomatisierung], Wissenstransfer (EXZELLENT) [Soft Skills], Testfallreview (SEHR_GUT) [Testmanagement], Kommunikation (SEHR_GUT) [Soft Skills], Teamfähigkeit (EXZELLENT) [Soft Skills], testOFFICE (EXZELLENT) [Testautomatisierung]\n  Erstellung und Kontrolle von Datensätzen in Excel vor und nach der Durchführung der Testfälle: Bei den Testfällen handelt es sich um Datensätze in Excel, die zum Teil mit Hilfe von Visual Basic Script ermittelt und konvertiert werden. Nach der automatisierten Abarbeitung eines Testfalls wird die Excel-Datei zusätzlich von mir manuell mit den ermittelten Werten befüllt. Häufig sind Fehler im Testlauf auf fehlerhafte Datensätze zurückzuführen, so dass genaues Arbeiten absolut notwendig ist.\n  Skills: Excel (EXZELLENT) [MS Office], Visual Basic Script (GUT) [Programmiersprachen], MS OFFICE (EXZELLENT) [MS Office], Genauigkeit (EXZELLENT) [Soft Skills]\n  Erstellung eines Skripts zur Datenübertragung mit Hilfe von Python in testOFFICE: Bei der erstmaligen Durchführung von Testfällen werden Textdateien erzeugt. Die darin enthaltenen Datensätze müssen in Excel-Dateien ergänzt und wieder in testOFFICE eingefügt werden. Dieser Vorgang ist sehr zeitaufwendig und fehleranfällig. Aus diesem Grund habe ich ein Skript in Python entwickelt, das diese Aufgabe in einem Bruchteil der Zeit und absolut zuverlässig erledigt.\n  Skills: Python (SEHR_GUT) [Programmiersprachen], Excel (EXZELLENT) [MS Office], testOFFICE (EXZELLENT) [Testautomatisierung], Wissenstransfer (EXZELLENT) [Soft Skills]\n- Entwickler | 2019-03-26\n  Ermittlung und Analyse der Anforderungen zur Schnittstelle testOFFICE und inSTEP Blue: Zunächst ermittele und analysiere ich alle Anforderungen für die Konzeptionierung. Dazu treffe ich mich mit dem Kunden und einem Berater von inSTEP Blue vor Ort. Es werden die Vorstellungen des Kunden besprochen, sowie Möglichkeiten zur Implementierung beider Tools vorgeschlagen. Weitere Rückfragen werden remote durch Skype Sessions geklärt.\n  Skills: Wissenstransfer (EXZELLENT) [Soft Skills], testOFFICE (EXZELLENT) [Testautomatisierung], Skype (SEHR_GUT) [Projektmanagement], Konzeptionierung (EXZELLENT) [Anforderungsmanagement]\n  Konzeptionierung, Erstellung und Integration von Diagrammen ins Konzept mit UML: Zur besseren Darstellung des Programmablaufs erstelle ich Sequenzdiagramme und integriere diese in das Konzept. Darüber hinaus dienen Use Case Diagramme dazu, konkrete Anwenderinteraktionen mit dem System aufzuzeigen. Dabei halte ich mich an die Vorgaben der UML und verwende das Open Source Tool UMLet.\n  Skills: UMLet (SEHR_GUT) [Modellierung], UML (SEHR_GUT) [Modellierung], Konzeptionierung (EXZELLENT) [Anforderungsmanagement]\n  Erstellung einer Aufwandsschätzung in Excel zur Implementierung der Schnittstelle: Wichtiger Bestandteil des Konzepts ist eine Aufwandsschätzung, die ich mit Hilfe von Excel erstelle. Dafür liste ich alle erforderlichen Tätigkeiten auf und versehe diese mit Schätzwerten. Beim Festlegen dieser Schätzungen sind mir meine bisherigen Erfahrungen als Entwickler sehr von Vorteil.\n  Skills: Excel (EXZELLENT) [MS Office]\n  Präsentation des Konzeptes beim Kunden in PowerPoint und Aufnahme von Kundenwünschen ins Konzept: Nach der Fertigstellung des Teil- und Gesamtkonzepts präsentiere ich dies beim Kunden mittels Beamer und in PowerPoint. Anregungen und Fragen des Kunden nehme ich ad hoc mit auf und beantworte diese soweit möglich direkt. Eine gewünschte Erweiterung der Features füge ich nach  Rücksprache mit dem Kunden der Konzeptionierung hinzu.\n  Skills: Präsentationen (GUT) [Soft Skills], PowerPoint (SEHR_GUT) [MS Office]\n- Entwickler | 2018-09-24\n  Anforderungsanalyse, Erstellung und Präsentation eines Grobkonzepts über Diagramme in UML: Nach der Anforderungsanalyse erstelle ich im Rahmen der Konzeptionierung Diagramme in UML, die dem Kunden zum Nachvollziehen des Programmflusses dienen. Weiter stelle ich die Unterschiede zum Erstellen eines Vorgangs in Jira zwischen den manuellen und automatisierten Testfällen in testOFFICE dar. Zum Abschluss präsentiere ich das Grobkonzept und kläre letzte Fragen mit dem Kunden.\n  Skills: Jira (EXZELLENT) [Testmanagement], testOFFICE (EXZELLENT) [Testmanagement], Word (EXZELLENT) [MS Office], Präsentationen (GUT) [Soft Skills], Konzeptionierung (EXZELLENT) [Anforderungsmanagement], UML (SEHR_GUT) [Modellierung], Kommunikation (SEHR_GUT) [Soft Skills]\n  Implementierung der Schnittstelle zwischen testOFFICE und Jira sowie Testautomatisierung mit JUnit: Nachdem das Konzept final abgestimmt ist, beginne ich mit der Implementierung der Schnittstelle und verwende zur Erstellung der Vorgänge die REST-API. Um Entitäten aus den JSON Responses zu erstellen, müssen diese zunächst geparst werden. Ich erweitere den Java-Code von testOFFICE um zusätzliche Funktionen und teste die Funktionsweise automatisiert mit JUnit nach dem Test Driven Development (TDD).\n  Skills: REST-API (SEHR_GUT) [Schnittstellen], Jira (EXZELLENT) [Testmanagement], Java (EXZELLENT) [Programmiersprachen], JSON (SEHR_GUT) [Programmiersprachen], JUnit (EXZELLENT) [Testautomatisierung], testOFFICE (EXZELLENT) [Testmanagement], Test Driven Development (TDD) (SEHR_GUT) [Vorgehensmodelle]\n  Erstellung einer Dokumentation in Word als Anleitung zur Schnittstelle und Coaching des Kunden: Damit der Kunde direkt mit der Schnittstelle arbeiten kann, erstelle ich eine Anleitung in Word zur Schnittstelle und teile mein Wissen. Bei der Erstellung der Anleitung und beim Coaching achte ich auf gut verständliche Inhalte und verwende ich so viele Screenshots, wie nötig, um den Leseaufwand gering zu halten. Die Anleitung stelle ich dem Kunden anschließend auch als PDF bereit.\n  Skills: Word (EXZELLENT) [MS Office], Wissenstransfer (EXZELLENT) [Soft Skills], Coaching (SEHR_GUT) [Vorgehensmodelle]\n- Manueller Tester | 2017-10-24\n  Dokumentation und Erstellung von Abweichungsberichten in Jira: Bei gefundenen Abweichungen in der Anwendung ist es wichtig, diese zu dokumentieren, um sie anschließend im Defektmanagement des Kunden in Jira einzutragen. Als ISTQB Certified Tester sowie Java Entwickler kenne ich die Eckpunkte informativer Berichte nach  ISTQB Standards sehr gut, so dass die Entwicklungsabteilung des Kunden keine Rückfragen dazu hat.\n  Skills: Jira (EXZELLENT) [Defektmanagement], ISTQB Standards (EXZELLENT) [Standards]\n  Ermittlung von Testfällen mit der SPIRIT testMatrix, Definieren und Anlegen von Testdaten: Zur Ermittlung von Testfällen verwenden wir die SPIRIT testMatrix. Für den Kunden ist es wichtig, dass die Darstellung seiner Anwendung auf verschiedenen Endgeräten und Browsern sichergestellt wird. Wir ermitteln alle gewünschten User Stories und achten besonders darauf, keine Redundanzen in den Testfällen zu erzeugen. Anschließend definiere ich noch die Testdaten und lege sie an.\n  Skills: Definieren und Anlegen von Testdaten (EXZELLENT) [Testautomatisierung], testMATRIX (SEHR_GUT) [Testfallermittlung], Genauigkeit (EXZELLENT) [Soft Skills], User Story Formulierung (EXZELLENT) [Anforderungsmanagement]\n  Manuelles und exploratives Testing in unterschiedlichen Browsern und auf verschiedenen Endgeräten: Nachdem alle Testfälle definiert worden sind, beginnen wir in kleinen Teams mit der manuellen Testdurchführung (manuelles Testing). Daneben habe ich auch die korrekte Darstellung auf verschiedenen Endgeräten in unterschiedlichen Browsern wie z. B.  Firefox,  Google Chrome, Internet Explorer und Microsoft Edge explorativ getestet (exploratives Testing).\n  Skills: Manuelles Testing (EXZELLENT) [Vorgehensmodelle], Firefox (EXZELLENT) [Browser], Google Chrome (EXZELLENT) [Browser], Internet Explorer (EXZELLENT) [Browser], Microsoft Edge (EXZELLENT) [Browser], manuelles Testing (EXZELLENT) [manuelles Testing], Exploratives Testing (EXZELLENT) [Vorgehensweise], Exploratives Testing (EXZELLENT) [Vorgehensmodelle], Softwaretest (EXZELLENT) [Teststufen / Testarten]\n  Defektmanagement in Excel, Word und Jira und exploratives Nach-Testing: Gefundene Abweichungen und Fehler habe ich direkt verifiziert und anschließend als Abweichungsbericht in Jira dokumentiert. Nachdem alle Testfälle durchgeführt worden sind, führen wir noch explorative Nach-Tests durch. Dabei hilft mir meine Erfahrung als Entwickler, so dass ich auch dabei noch einige Abweichungen finden kann.\n  Skills: Excel (EXZELLENT) [MS Office], Word (EXZELLENT) [MS Office], Exploratives Testing (EXZELLENT) [Vorgehensweise], Exploratives Testing (EXZELLENT) [Vorgehensmodelle], Genauigkeit (EXZELLENT) [Soft Skills], Jira (EXZELLENT) [Defektmanagement]\n\nZertifikate/Schulungen:\n- mindscreen GmbH | Grundlagen der digitalen Barrierefreiheit | 2021-01-24 | true | 60463134e3f00b6fc4c15d14\n- lawpilots | Datenschutz für Mitarbeiter | 2018-07-24 | true | 5e4bb7b9e3f00be45c6e7f76\n- lawpilots | IT-Sicherheit für Mitarbeiter | 2018-07-24 | true | 5e4bb790e3f00be45c6e7f67","job":"Als Teil der Capgemini-Gruppe schafft Sogeti durch Technologie Mehrwert für Organisationen, die Innovationen schnell umsetzen möchten und dazu lokal einen weltweit vertretenen Partner suchen. Mit einer lösungsorientierten Kultur und Kundennähe implementiert Sogeti Lösungen, die Unternehmen dabei helfen, schneller, besser und intelligenter zu arbeiten. Mit der Kombination von Agilität und Umsetzungsgeschwindigkeit durch einen DevOps-Ansatz liefert Sogeti innovative Lösungen in den Bereichen Quality Engineering, Cloud und Anwendungsentwicklung – jeweils unter Einsatz von KI, Daten und Automatisierung.\r\n\r\nDeine Rolle\r\nKonzeption, Management und Kontrolle aller Testaktivitäten in Kundenprojekten\r\nDefinition und Erstellung von Teststrategien und Testkonzepten sowie Auswahl geeigneter Methoden und Werkzeuge\r\nOrganisation des Projektteams, Kommunikation mit Kunden und Coaching des Testteams in allen fachlichen und methodischen Fragen\r\nErstellung von Reports für interne und externe Stakeholder sowie Überwachung von Qualitätszielen\r\nEntwicklung und Umsetzung von Maßnahmen zur Prozessoptimierung (z. B. nach TPI NEXT®)\r\nDein Profil\r\nErfahrung im Testmanagement sowie im Einsatz gängiger Testing-Tools (z. B. Micro Focus ALM, Jira) und Verständnis für Softwareentwicklungsprozesse\r\nKnow-how in Datenbanktechnologien, Konfigurationsmanagement und Projektmanagement\r\nKommunikationsstärke auf Fach-, Technik- und Managementebene sowie projektbezogene Reisebereitschaft innerhalb Deutschlands\r\nSehr gute Deutschkenntnisse (mindestens B2) und konversationssicheres Englisch\r\nWünschenswert: ISTQB® Advanced Level Testmanager, agiler Background, Erfahrung in Teamführung sowie abgeschlossenes Studium oder vergleichbare Ausbildung\r\nWas du bei uns schätzen wirst\r\nBei Sogeti kombinierst du dein Wissen mit deiner Leidenschaft für Technologie, treibst zukunftsweisende Themen voran und gestaltest die Welt von morgen aktiv mit.\r\n\r\nWir bieten dir ein Umfeld, in dem du dich stetig weiterentwickeln kannst. Unser Angebot an Weiterbildungsprogrammen hilft dir, eine Welt voller Möglichkeiten zu entdecken – sei es durch fachliche Schulungen, online Kurse, Mentoring, Coaching oder spezialisierte Programme für Führungskräfte.\r\n\r\nWir legen großen Wert auf die Vereinbarkeit von Arbeit und Privatleben. Arbeite nach Absprache hybrid aus dem Office, von zu Hause, an anderen Capgemini-Standorten in Deutschland oder aus dem Ausland. Flexible Arbeitszeitmodelle unterstützen dich dabei.\r\n\r\nDeine Benefits\r\nShareholder-Programm für Mitarbeitende / Firmen-Anteile\r\n\r\nMobiles Arbeiten möglich, auch aus dem Ausland\r\nFlexible Vertrauensarbeitszeit\r\nFirmenwagen und Jobrad optional\r\nZahlreiche interne Weiterbildungsmöglichkeiten\r\nVergünstigungen bei Sport- und Wellnesseinrichtungen (EGYM Wellpass)\r\nEdenred und zahlreiche Rabatte in diversen Onlineshops\r\nHome-Office-Ausstattung und vieles mehr...\r\n\r\nSämtliche in der Anzeige genannten Nebenleistungen geben lediglich einen ersten Überblick ohne Anerkennung einer Rechtspflicht. Sie richten sich nach den jeweils gültigen Betriebsvereinbarungen, Policies, betrieblichen Regelungen und Anspruchsvoraussetzungen zum Zeitpunkt des Eintritts in das Unternehmen.","language":"de"}
