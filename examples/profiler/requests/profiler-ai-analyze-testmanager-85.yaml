Für den geplanten Loadtest sende ich unterschiedliche Paketgrößen über verschiedene Netzwerkprotokolle in definierten Zeitintervallen an einen Host. Dazu definiere und hinterlege ich Variablen im Code und stelle sicher, dass bei der Nutzung von UDP kein Packetloss auftritt, um eine stabile und zuverlässige Testumgebung zu gewährleisten.\n  Skills: Python (SEHR_GUT) [Programmiersprachen]\n- Software-Entwickler | 2017-08-06\n  Weiterentwicklung bestehender Komponenten, Implementierung neuer Schnittstellen und Module in Java: In einem funktionsübergreifenden Team liegt meine Hauptaufgabe in der Planung und Weiterentwicklung bestehender Komponenten sowie der Implementierung neuer Schnittstellen und Module. Nach einer Anforderungsanalyse beginne ich mit der Planung. Während der Implementierung mit Java Swing in der Eclipse IDE entwickle ich Tests in JUnit. Als Versionsverwaltungstool wird Subversion verwendet.\n  Skills: Eclipse (EXZELLENT) [Entwicklungsumgebungen], Java Swing (EXZELLENT) [Frameworks], Java (EXZELLENT) [Programmiersprachen], testOFFICE (EXZELLENT) [Testautomatisierung], Subversion (SVN) (SEHR_GUT) [Versionsverwaltung], JUnit (EXZELLENT) [Testautomatisierung]\n  Review und Erstellung von automatisierten Testfällen in testOFFICE und Defektmanagment mit Jira: Ich verwalte die in der Software gefundenen Abweichungen in Jira. Daraus erstelle ich regelmäßig neue automatisierte Testfälle und/oder passe bestehende an. Die Tests nutzen testOFFICE - TCDL - Keyword Driven Testing und können in Regressionstests integriert werden, bevor eine neue Version von testOFFICE veröffentlicht wird. Dies geschieht im Rahmen unseres agilen Entwicklungsansatzes.\n  Skills: testOFFICE (EXZELLENT) [Testautomatisierung], testOFFICE - TCDL - Keyword driven testing (EXZELLENT) [Testautomatisierung], Jira (EXZELLENT) [Defektmanagement], Testfallreview (SEHR_GUT) [Testmanagement], Regressionstests (EXZELLENT) [Teststufen / Testarten], Softwaretest (EXZELLENT) [Teststufen / Testarten], 