d Driven Testing (SEHR_GUT) [Vorgehensmodelle], Aufbau von automatisierten Regressionstestfällen (EXZELLENT) [Testautomatisierung], Definieren und Anlegen von Testdaten (EXZELLENT) [Testautomatisierung], Erstellung von fachlichen Automatisierungsskripten (EXZELLENT) [Testautomatisierung], testOFFICE (EXZELLENT) [Testautomatisierung], testOFFICE - Browser Engine auf Basis von Selenium (EXZELLENT) [Testautomatisierung], testOFFICE - TCDL - Keyword driven testing (EXZELLENT) [Testautomatisierung], testOFFICE TestEngineer Arbeitsplatz (EXZELLENT) [Testwerkzeuge]\n  Durchführung von Regressionstestfällen in testOFFICE und Verifizierung im SAP Business Client: Nach dem Aufbau von Regressionstestfällen in testOFFICE führe ich diese automatisiert aus. Zudem lege ich Testdaten in Testdatenblättern ab und verifiziere abschließend die automatisierte Ausführung im SAP Business Client. Gefundene Fehler habe ich in der Automatisierung umgehend korrigiert.\n  Skills: SAP Business Client (SEHR_GUT) [SAP], Testautomatisierung (EXZELLENT) [Testing], Regressionstests (EXZELLENT) [Teststufen / Testarten], Softwaretest (EXZELLENT) [Teststufen / Testarten], testOFFICE (EXZELLENT) [Testautomatisierung]\n  Anlage von SAP Testdaten im Integrationssystem von GARANT, Durchführung von Testplänen und -fällen: Um in kurzer Zeit SAP Testdaten im Integrationssystem von GARANT für Integrationstests anzulegen, führe ich die zuvor automatisierten Testfälle in Form von Testplänen und Testpaketen automatisiert in testOFFICE aus. Bei Auffälligkeiten wie z. B. Fehler durch inkonsistente Testdaten stimme ich mich mit dem Fachbereich ab und finde eine adäquate Lösung.\n  Skills: MS Excel (EXZELLENT) [MS Office], Definieren und Anlegen von Testdaten (EXZELLENT) [Testautomatisierung], testOFFICE (EXZELLENT) [Testautomatisierung], testOFFICE - Browser Engine auf Basis von Selenium (EXZELLENT) [Testautomatisierung], testOFFICE - TCDL - Keyword driven testing (EXZELLENT) [Testautomatisierung], testOFFICE TestEn