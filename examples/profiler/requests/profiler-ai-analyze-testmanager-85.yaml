r Tests in testOFFICE: In einem vorangegangenen Projekt wurden automatisierte Testsuiten in testOFFICE erstellt und bearbeitet. Im Anschluss daran betreue ich die Fachanwender weiterhin bei allen Fragen rund um den Testaufbau und unterstütze bei der Umsetzung der weiteren Entwicklung. Dazu coache ich einzelne Fachanwender und gebe mein Wissen weiter.\n  Skills: Coaching (SEHR_GUT) [Vorgehensmodelle], Wissenstransfer (EXZELLENT) [Soft Skills], SAP LO-AB (GUT) [SAP], Performance Test (SEHR_GUT) [Teststufen / Testarten], Softwaretest (EXZELLENT) [Teststufen / Testarten], testOFFICE (EXZELLENT) [Testautomatisierung], testOFFICE (EXZELLENT) [Testmanagement], testOFFICE (EXZELLENT) [Support], Agile Vorgehensweise (EXZELLENT) [Vorgehensmodelle]\n  Bereitstellung neuer testOFFICE Versionen und Beratung des Betriebs zur Installation: Um einen möglichst reibungslosen Betrieb zu gewährleisten, werden in regelmäßigen Abständen neue Versionen von testOFFICE zur Verfügung gestellt. Bei Fragen zur Installation stehe ich dem Kunden beratend zur Seite.\n  Skills: testOFFICE (EXZELLENT) [Support], Kommunikation (SEHR_GUT) [Soft Skills], Teamfähigkeit (EXZELLENT) [Soft Skills], testOFFICE (EXZELLENT) [Testautomatisierung], testOFFICE (EXZELLENT) [Testmanagement]\n- Coach für testOFFICE | 2022-01-25\n  Vorbereitung und Durchführung des Coachings, der Präsentationen und Schulungen in testOFFICE: Regelmäßig schulen wir die Mitarbeiter des Kunden in der Durchführung, Pflege und Erweiterung der Testautomatisierung. Das notwendige Know-how zu testOFFICE, der .NET Engine und der SAP Engine sowie zum Keyword Driven Testing vermittle ich \"on the job\". Mein Coaching umfasst die Überführung von manuellen in automatisierte Testfälle. Dabei zeige ich Best Practices im Software Test Engineering auf.\n  Skills: testOFFICE (EXZELLENT) [Testautomatisierung], testOFFICE (EXZELLENT) [Testmanagement], Schulungen (GUT) [Sonstige], testOFFICE - .NET Engine (EXZELLENT) [Testautomatisierung], testOFFICE - 