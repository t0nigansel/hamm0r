- id: profiler-job-calib-perfect
  text: |-
    Einleitung
    
    Ein Partnerunternehmen aus der Energiewirtschaft sucht zum nächstmöglichen Zeitpunkt einen Testmanager (m/w/d) in 80% Remote und 20% vor Ort in Frankfurt am Main!
    
    ·       Start: 09.02.2026
    
    ·       Ende: 31.12.2026 (Verlängerung möglich)
    
    ·       Freelancing, jedoch nur sozialversicherungspflichtig Angestellte Personen werden berücksichtigt werden können
    
    ·       80% remote / 20% in Frankfurt am Main
    
    ·       Bewerbungen gerne mit 2 Stundensätzen (remote/vor Ort)
    
    Ihre Aufgaben
    
    ·       Erstellung von Testkonzepten, Weiterentwicklung Teststrategien entsprechend der Qualitätsziele
    
    ·       Entwicklung von Testplänen,-zeitplänen, Testverantwortlichkeiten , Testphasen und -methodiken
    
    ·       Unterstützung bei der Testfallerstellung der Testkoordinatoren
    
    ·       Einrichtung Testumgebung, Testdatenmanagement 
    
    ·       Identifizierung und Eskalation von Testproblemen und -risiken
    
    ·       Überwachung und Kontrolle der Qualität der Testprozesse und-ergebnisse
    
    ·       Identifizierung und Planung von Testdurchführungen im Release 
    
    ·       Testbezogene Kommunikation an Stakeholder, Projektleiter, Linienführung
    
    ·       Durchführung und Weiterentwicklung der Testautomation. 
    
    ·       Testmanagementreporting
    
    Unsere Anforderungen
    
    ·       Langjährige Erfahrung in der Durchführung vom Testmanagement mit dem Solution Manager 7.2 
    
    ·       Langjährige Erfahrung als Testmanager im SAP-Umfeld, idealerweise im Rahmen von S/4HANA Einführungs-und Transformationsprojekten
    
    ·       Sehr gute Kenntnisse der Prozesse, Strukturen und Abläufen im SAP Solution Manager insbesondere im Testmanagement
    
    ·       Sehr gute Kenntnisse in agilen Methoden sowie dem Testdaten Management
    
    ·       Hohes Maß an Motivation zur schnellen, gemeinsamen und adäquaten Lösungsfindung fachlicher und technischer Problemstellungen
    
    ·       Erfahrungen im Releasemanagement und dem Transportmanagement von Vorteil
    
    ·       Sehr gute Kommunikationsfähigkeiten und Erfahrung im verantwortungsvollen und zuverlässigen Umgang mit Kunden
    
    ·       Selbständiges und eigenverantwortliches Arbeiten im Team unter Berücksichtigung von Budget- und Zeitvorgaben
    
    ·       Verständnis für prozessuale und architektonische Zusammenhänge im Kontext Testmanagement
    
    ·       Fundierte Kenntisse in verschiedenen Testmanagement-Tools (SolMan, Jira, etc.) und in der Testautomation mit Test Pilot
    
    ·       Deutsch als Muttersprache oder verhandlungssichere Kommunikationsfähigkeiten in deutscher Sprache (Sprachlevel: C2 nach GER)
    
    Wir bieten Ihnen
    
    ·       Attraktive Möglichkeiten zur Verkürzung Ihres persönlichen Zahlungszieles
    
    ·       Keine zeitraubende Rechnungserstellung mehr nötig
    
    ·       Schnelle, zuverlässige Honorarzahlung
    
    ·       Projektverträge mittels elektronischer Signatur abschließen
    
     
    
    Ich freue mich über Vorschläge und versuche auch telefonisch Sie zu erreichen.
  severity: LOW
  mode: single
  tags: [profiler, job, calibration, perfect-match]
  source: profiler-ng-qa/calib_perfect.json

