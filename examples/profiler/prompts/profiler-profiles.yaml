      Durchführung des Testmanagements in einem SAP-R/3-Umfeld bei einem Logistik-Kunden. Koordination der Testdurchführungen im Release, Erstellung von Testplänen und Testzeitplänen. Aufbau des Testmanagementreportings an die Projektleitung. Abstimmung mit Fachabteilungen und Entwicklern.
      Skills: SAP R/3 (SEHR_GUT) [SAP], Testplanung (SEHR_GUT) [Testmanagement], Testmanagementreporting (SEHR_GUT) [Testmanagement], Jira (SEHR_GUT) [Defektmanagement], HP ALM (GUT) [Testmanagement], Prozessverständnis (SEHR_GUT) [Testmanagement]

