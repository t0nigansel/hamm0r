      Skills: SAP Solution Manager 7.2 (SEHR_GUT) [Testmanagement], Test Pilot (SEHR_GUT) [Testautomation], Releasemanagement (SEHR_GUT) [Testmanagement], Transportmanagement (SEHR_GUT) [SAP], Testautomation (SEHR_GUT) [Testautomation], Risikomanagement (SEHR_GUT) [Testmanagement], Agile Methoden (SEHR_GUT) [Vorgehensmodelle], Kommunikationsfähigkeit (SEHR_GUT) [Soft Skills]

