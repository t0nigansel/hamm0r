      Konzeption und Steuerung der Gesamtteststrategie über 18 Monate für eine S/4HANA-Einführung. 6 parallele Testphasen, 2200 Testfälle, Testautomation mit Test Pilot für ca. 1100 Fälle. Architektur- und Prozessabstimmung mit SAP-Architekten und Fachbereichen. Einhaltung Budget- und Zeitplan mit <5% Abweichung.
