# hamm0r-starter-version: 2026.05
# Starter request template. Startup seeding never overwrites user files.
version: 1
id: anthropic-messages
name: "Anthropic — Messages"
method: POST
url: "https://api.anthropic.com/v1/messages"
auth:
  type: custom-header
  header_name: x-api-key
  value_env: ANTHROPIC_API_KEY
headers:
  Content-Type: "application/json"
  anthropic-version: "2023-06-01"
body:
  format: json
  content:
    model: "claude-sonnet-4-5"
    max_tokens: 1024
    messages:
      - role: user
        content: "{{prompt}}"
response:
  extract:
    type: jsonpath
    path: "$.content[0].text"
timeout_seconds: 60
tag: starter-anthropic
